<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <!-- favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <!-- css -->
    <link rel="stylesheet" href="style.css" />
    <!-- bootstrap -->

    <title>Frontend Mentor | Shortly URL shortening API Challenge</title>
  </head>
  <body>
    <header class="header">
      <nav class="nav">
        <div class="nav__content">
          <!-- <a class="logo" href="index.html"> -->
          <img class="logo" src="images/logo.svg" alt="" />
          <!-- </a> -->
          <div class="nav__menu">
            <div class="nav__item nav__start">
              <a class="nav__link" href="#">Features</a>
              <a class="nav__link" href="#">Pricing</a>
              <a class="nav__link" href="#">Resources</a>
            </div>
            <!-- <hr /> -->
            <div class="nav__item nav__end">
              <a class="nav__link" href="#">Login</a>
              <a class="nav__link button button--round nav__button" href="#"
                >Sign Up</a
              >
            </div>
          </div>
          <div class="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
          </div>
        </div>
      </nav>
      <section class="hero">
        <div class="hero__content">
          <div class="hero__left hero__div">
            <h1 class="hero__title">More than just shorter links</h1>
            <p class="hero__text">
              Build your brand’s recognition and get detailed insights on how
              your links are performing.
            </p>
            <a href="#" class="button button--round hero__button"
              >Get Started</a
            >
          </div>
          <img
            src="images/illustration-working.svg"
            alt=""
            class="hero__img hero__right hero__div"
          />
        </div>
      </section>
    </header>
    <section class="shorten-link">
      <input
        class="shorten-link__input"
        placeholder="Shorten a link here..."
        type="text"
      />
      <a href="" class="button button--square">Shorten it!</a>
    </section>
    <script src="main.js"></script>
  </body>
</html>
